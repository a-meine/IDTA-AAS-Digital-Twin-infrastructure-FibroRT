server.port=8081
spring.application.name=AAS Environment

basyx.backend=MongoDB

spring.mongodb.host=mongo
spring.mongodb.port=27017
spring.mongodb.database=aasenvironment
spring.mongodb.authentication-database=admin
spring.mongodb.username=${MONGO_USERNAME}
spring.mongodb.password=${MONGO_PASSWORD}

basyx.aasrepository.mongodb.collectionName=aas-repo
basyx.submodelrepository.mongodb.collectionName=submodel-repo
basyx.cdrepository.mongodb.collectionName=cd-repo

basyx.aasrepository.feature.registryintegration=http://aas-registry:8080
# [reverse-proxy] externalurl stays HTTP — this server is only called by nginx or other containers
basyx.externalurl=http://${HOST_IP}:8081

# === Authorization ===
basyx.feature.authorization.enabled=true
basyx.feature.authorization.type=rbac
basyx.feature.authorization.jwtBearerTokenProvider=keycloak
basyx.feature.authorization.rbac.file=file:/config/rbac_rules.json

# Keycloak JWT validation
# [reverse-proxy] issuer-uri changed to https://:9443 — must match the JWT iss claim
# Keycloak now generates tokens with issuer https://192.168.56.212:9443/realms/BaSyx
spring.security.oauth2.resourceserver.jwt.issuer-uri=https://${HOST_IP}:9443/realms/BaSyx
# jwk-set-uri stays on internal Docker network (container-to-container, no TLS needed)
spring.security.oauth2.resourceserver.jwt.jwk-set-uri=http://keycloak:8080/realms/BaSyx/protocol/openid-connect/certs

# CORS
# [reverse-proxy] allowed-origins — HTTPS on port 8443 (rootless Docker can't bind 443)
basyx.cors.allowed-origins=https://${HOST_IP}:8443
basyx.cors.allowed-methods=GET,POST,PUT,PATCH,DELETE,OPTIONS,HEAD
basyx.cors.allowed-headers=*
basyx.cors.allow-credentials=true



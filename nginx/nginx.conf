# Reverse proxy for BaSyx — HTTPS termination
# Added as part of the reverse proxy setup for network-accessible auth (PKCE requires secure context)

events {
    worker_connections 1024;
}

http {
    # Podman DNS resolver — allows proxy_pass with variables
    # so nginx starts even if upstream containers aren't running yet
    resolver 10.89.0.1 valid=30s ipv6=off;

    # ── Server 0: HTTP → HTTPS redirect ───────────────────────
    server {
        listen 80;
        server_name 192.168.56.212;
        return 301 https://$host:8443$request_uri;
    }

    # ── Server 1: HTTPS → AAS Web UI + AAS Environment API ────
    # Terminates TLS for the AAS GUI so the browser has a secure
    # context (required for crypto.subtle / PKCE in OAuth2).
    # API paths (/shells, /submodels, /concept-descriptions) are
    # proxied to aas-environment:8081 so the browser only talks to
    # one origin — no cross-origin / cert-per-port issues.
    server {
        listen 8443 ssl;
        server_name 192.168.56.212;

        ssl_certificate     /etc/nginx/certs/server.crt;
        ssl_certificate_key /etc/nginx/certs/server.key;

        # AAS Environment API — path-based routing (same origin as SPA)
        location ~ ^/(shells|submodels|concept-descriptions|upload|serialization) {
            set $aas_env http://aas-environment:8081;
            proxy_pass $aas_env;
            proxy_set_header Host              $host;
            proxy_set_header X-Real-IP         $remote_addr;
            proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header X-Forwarded-Host  $host;
            proxy_set_header X-Forwarded-Port  $server_port;
        }

        # AAS Registry — read-only discovery for external users
        # Internal AAS Environment calls go directly to aas-registry:8080
        # (bypassing nginx), so POST/PUT/DELETE still work for shell registration.
        location /registry/ {
            limit_except GET HEAD OPTIONS {
                deny all;
            }
            set $aas_reg http://aas-registry:8080;
            proxy_pass $aas_reg/;
            proxy_set_header Host              $host;
            proxy_set_header X-Real-IP         $remote_addr;
            proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header X-Forwarded-Host  $host;
            proxy_set_header X-Forwarded-Port  $server_port;
        }

        # Universal AAS Discovery UI
        location /universal/ {
            set $discovery_ui http://discovery-ui:3001;
            rewrite ^/universal/(.*)$ /$1 break;
            proxy_pass $discovery_ui$uri;
            proxy_set_header Host              $host;
            proxy_set_header X-Real-IP         $remote_addr;
            proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header X-Forwarded-Host  $host;
            proxy_set_header X-Forwarded-Port  $server_port;
        }

        # Everything else → AAS Web UI (static SPA)
        location / {
            set $aas_web_ui http://aas-web-ui:3000;
            proxy_pass $aas_web_ui;
            proxy_set_header Host              $host;
            proxy_set_header X-Real-IP         $remote_addr;
            proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header X-Forwarded-Host  $host;
            proxy_set_header X-Forwarded-Port  $server_port;
        }
    }

    # ── Server 2: HTTPS → Keycloak ────────────────────────────
    # Proxies the Keycloak auth server over HTTPS so OIDC
    # discovery and the authorization endpoint work from the
    # browser in the secure context.
    server {
        listen 9443 ssl;
        server_name 192.168.56.212;

        ssl_certificate     /etc/nginx/certs/server.crt;
        ssl_certificate_key /etc/nginx/certs/server.key;

        location / {
            set $keycloak_upstream http://keycloak:8080;
            proxy_pass $keycloak_upstream;
            proxy_set_header Host              $host;
            proxy_set_header X-Real-IP         $remote_addr;
            proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header X-Forwarded-Host  $host;
            proxy_set_header X-Forwarded-Port  $server_port;
        }
    }
}
